<article class="m-3">
  <a routerLink="/books" class="btn btn-link px-0 mb-3">Back to book list</a>

  <section class="card">
    <div class="card-body">
      <h2 class="card-title">{{ book.title }}</h2>
      <h6 class="card-subtitle mb-3 text-muted">{{ book.author }}</h6>

      <dl class="row mb-0">
        <dt class="col-sm-3">Year of publication</dt>
        <dd class="col-sm-9">{{ book.year }}</dd>

        <dt class="col-sm-3">Description</dt>
        <dd class="col-sm-9">{{ book.description }}</dd>
      </dl>
    </div>
  </section>

  <section class="mt-4">
    <h3>Reviews</h3>

    <div class="d-flex flex-column gap-3 mt-3">
      @if (reviews.length === 0) {
        <p class="text-muted mb-0">No reviews for this book yet.</p>
      } @else {
        @for (review of reviews; track review.id) {
          <bs-review-item [review]="review"></bs-review-item>
        }
      }
    </div>
  </section>

  <bs-review-form
    [bookId]="book.id"
    (reviewSaved)="onReviewSaved($event)"
  ></bs-review-form>
</article>
