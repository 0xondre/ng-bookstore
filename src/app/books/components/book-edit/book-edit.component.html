<article class="m-3">
  <h2>Edit book</h2>

  <form [formGroup]="form" (ngSubmit)="save()" class="card mt-3">
    <div class="card-body d-flex flex-column gap-3">
      <div>
        <label for="title" class="form-label">Title</label>
        <input
          id="title"
          type="text"
          formControlName="title"
          class="form-control"
          [class.is-invalid]="isInvalid('title')"
        >
        <div class="invalid-feedback">
          Title is required and cannot be longer than 50 characters.
        </div>
      </div>

      <div>
        <label for="author" class="form-label">Author</label>
        <input
          id="author"
          type="text"
          formControlName="author"
          class="form-control"
          [class.is-invalid]="isInvalid('author')"
        >
        <div class="invalid-feedback">
          Author is required and cannot be longer than 50 characters.
        </div>
      </div>

      <div>
        <label for="year" class="form-label">Year</label>
        <input
          id="year"
          type="number"
          formControlName="year"
          class="form-control"
          [class.is-invalid]="isInvalid('year')"
        >
        <div class="invalid-feedback">
          Year must be a number between 1000 and 2023.
        </div>
      </div>

      <div>
        <label for="description" class="form-label">Description</label>
        <textarea
          id="description"
          rows="6"
          formControlName="description"
          class="form-control"
          [class.is-invalid]="isInvalid('description')"
        ></textarea>
        <div class="invalid-feedback">
          Description cannot be longer than 1000 characters.
        </div>
      </div>

      <div class="d-flex gap-2">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="form.invalid || form.pristine || isSaving"
        >
          Save
        </button>
        <a routerLink="/books" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </form>
</article>
