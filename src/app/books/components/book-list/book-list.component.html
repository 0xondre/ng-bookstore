<article class="m-3">
  <h2>List of all books</h2>

  <div class="mt-3 mb-4">
    <label for="book-search" class="form-label">Search books</label>
    <input
      id="book-search"
      type="text"
      class="form-control"
      [formControl]="searchControl"
      placeholder="Type at least 2 characters"
    >
  </div>

  <section class="d-flex flex-column gap-2">
    @if (books$ | async; as books) {
      @if (books.length === 0) {
        <p class="text-muted mb-0">No books match the current search.</p>
      } @else {
        @for (book of books; track book.id) {
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">{{ book.title }}</h5>
              <h6 class="card-subtitle mb-2 text-muted">{{ book.author }}</h6>
              <p class="card-text">
                {{ book.description }}
              </p>
              <a [routerLink]="[book.id, 'edit']" class="card-link">Edit</a>
              <a [routerLink]="[book.id, 'reviews']" class="card-link">Reviews</a>
            </div>
          </div>
        }
      }
    }

  </section>
</article>
