<article class="card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start gap-3">
      <div>
        <h5 class="card-title mb-1">{{ review.title }}</h5>
        <p class="text-muted mb-2">Author: {{ review.author ?? 'Unknown author' }}</p>
      </div>
      <span class="badge text-bg-secondary">Rate: {{ review.rate }}/5</span>
    </div>

    <p class="card-text mb-0">{{ review.description }}</p>
  </div>
</article>
